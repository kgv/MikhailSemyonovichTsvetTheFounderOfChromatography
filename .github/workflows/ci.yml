name: CI

on:
  workflow_dispatch:

env:
  LANGUAGES: ru en es ja ko zh
  MDBOOK_VERSION: 0.5.1

jobs:
  run:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: write  # To push a branch 
      pages: write  # To push to a GitHub Pages site
      id-token: write # To update the deployment status
    steps:
    - uses: actions/checkout@v7
      with:
        # We need the full history below.
        fetch-depth: 0

    - name: Update rustup
      run: rustup self update

    - name: Install Rust
      run: |
        rustup set profile minimal
        rustup toolchain install nightly -c rust-docs
        rustup default nightly

    - name: Install mdbook
      run: |
        mkdir bin
        curl -sSL https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz | tar -xz --directory=bin
        echo "$(pwd)/bin" >> ${GITHUB_PATH}

    # - name: Install mdbook (latest)
    #   run: |
    #     tag=$(curl 'https://api.github.com/repos/rust-lang/mdbook/releases/latest' | jq -r '.tag_name')
    #     url="https://github.com/rust-lang/mdbook/releases/download/${tag}/mdbook-${tag}-x86_64-unknown-linux-gnu.tar.gz"
    #     mkdir mdbook
    #     curl -sSL $url | tar -xz --directory=./mdbook
    #     echo `pwd`/mdbook >> $GITHUB_PATH

    - name: Install mdbook-i18n-helpers
      run: |
        cargo install mdbook-i18n-helpers --locked --version 0.4.0

    - name: Install mdbook-katex
      run: |
        cargo install mdbook-katex --locked --version=0.10.0-alpha

    - name: Report versions
      run: |
        rustup --version
        rustc -Vv
        mdbook --version
        cargo install --list

    - name: Run tests
      run: mdbook test

    - name: Build HTML
      run: mdbook build

    - name: Build all translations
      run: |
        for po_lang in ${{ env.LANGUAGES }}; do
          echo "::group::Building $po_lang translation"
          # Set language and adjust site URL. Clear the redirects
          # since they are in sync with the source files, not the
          # translation.
          MDBOOK_BOOK__LANGUAGE=$po_lang \
          mdbook build -d book/$po_lang
          echo "::endgroup::"
        done
