[book]
title = "Mikhail Semyonovich Tsvet the founder of chromatography"
authors = [
    "Evgenia Mikhailovna Senchenkova (Author)",
    "Giorgi Vladimirovich Kazakov (Editor)",
    "Roman Alexandrovich Sidorov (Editor)",
]
description = "Mikhail Semyonovich Tsvet the founder of chromatography"
language = "ru"

[preprocessor.katex]
after = ["links"]
before = ["gettext"]
renderers = ["epub", "html", "pdf"]

[preprocessor.gettext]
optional = true
after = ["links"]

[build]
extra-watch-dirs = ["po"]

[output.html]
additional-css = ["theme/css/language-picker.css"]
git-repository-url = "https://github.com/kgv/MikhailSemyonovichTsvetTheFounderOfChromatography"

[output.html.search]
enable = true
use-boolean-and = true

[output.html.fold]
enable = true
level = 2

# DOCX
[output.pandoc.profile.docx]
output-file = "output.docx"

# LATEX
[output.pandoc.profile.latex]
output-file = "output.tex"

[output.pandoc.profile.latex.variables]
lang = "ru-RU"
mainfont = "Liberation Serif"
header-includes = [
    # "\\raggedright" # Выровнять текст по левому краю
    "\\sloppy", # "Разрешаю делать пробелы между словами какими угодно большими, главное — не вылезай за правый край страницы"
    "\\usepackage[none]{hyphenat}",
    "\\usepackage{alphabeta}",
    "\\usepackage{grffile}", # Точки в именах файлов
    "\\graphicspath{{../../../}}", # Исправление путей
    "\\usepackage{lineno}", # Номера строк
    "\\linenumbers",
    "\\usepackage{draftwatermark}", # Водяной знак
    "\\SetWatermarkText{Laboratory of Lipid Metabolism\\\\\nK.A. Timiryazev Institute of Plant Physiology\\\\\nRussian Academy of Sciences\\\\\n\\small{Giorgi V. Kazakov, Roman A. Sidorov}}",
]